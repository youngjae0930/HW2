name: CI/CD - Docker Hub Push

# main 브랜치에 코드가 push되거나 PR이 완료되면 작동합니다.
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. 소스 코드 체크아웃
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Docker Hub 로그인
      # GitHub Settings > Secrets > Actions에 등록된 값을 사용합니다.
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3. Docker 이미지 빌드 및 푸시
      # 빌드 속도 향상을 위해 캐시 기능을 사용하며, latest와 커밋 SHA 태그를 동시에 부여합니다.
      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/object-detective:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/object-detective:${{ github.sha }}
      # 거대 모델이 포함되므로 타임아웃을 넉넉하게 설정
          no-cache: false

  deploy:
    # 이 작업은 내 컴퓨터(self-hosted)에서만 실행됩니다.
    needs: build-and-push
    runs-on: self-hosted

    steps:
      # 1. 소스 코드 체크아웃 (docker-compose.yml 파일을 가져오기 위함)
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Docker Hub 로그인 (최신 이미지를 내려받기 위함)
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3. 최신 이미지 배포
      - name: Deploy with Docker Compose
        run: |
          # 환경 변수 설정을 위해 .env 파일 생성 (또는 기존 값 활용)
          echo "DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}" > .env
          
          # 기존 이미지 최신화 및 서비스 재배포
          docker-compose pull
          docker-compose up -d
          
          # 사용하지 않는 이미지 정리 (선택사항)
          docker image prune -f
